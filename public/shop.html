<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop · nightly build</title>
  <meta name="description" content="Every Nightly Build drop. Tees, hoodies, mugs and tumblers for people who ship. Printed on demand.">
  <link rel="canonical" href="https://nightlybuild.courtrightco.com/shop">
  <meta name="theme-color" content="#0b0d10">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="nightly build">
  <meta property="og:title" content="Shop · nightly build">
  <meta property="og:description" content="Every Nightly Build drop. Printed on demand.">
  <meta property="og:url" content="https://nightlybuild.courtrightco.com/shop">
  <meta property="og:image" content="https://nightlybuild.courtrightco.com/img/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://nightlybuild.courtrightco.com/img/og.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <style>:root{--bg:#0b0d10;--text:#edebe4}html,body{margin:0;background:#0b0d10;color:#edebe4;font-family:system-ui,sans-serif}.site-header{height:58px;border-bottom:1px solid #1e242c}</style>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="wordmark" href="/">nightly build<span class="cursor" aria-hidden="true"></span></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/shop" aria-current="page">Shop</a>
        <a href="/about">About</a>
      </nav>
      <a class="cart-btn" href="/cart" data-open-cart aria-label="Open cart">
        cart <span class="cart-count" data-cart-count data-empty="true">0</span>
      </a>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head">
          <h1>Shop</h1>
          <span class="muted mono" data-count></span>
        </div>

        <div class="toolbar">
          <button class="btn btn-ghost filter-toggle" data-open-filters aria-haspopup="dialog">Filters &amp; sort</button>
          <div id="filters" class="desktop-filters" style="display:flex;gap:12px;flex-wrap:wrap"></div>
        </div>

        <div class="grid" data-grid></div>
        <div style="text-align:center;margin-top:32px">
          <button class="btn" data-loadmore style="display:none">Load more</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Mobile filter bottom-sheet -->
  <div class="sheet-backdrop" data-sheet-backdrop></div>
  <div class="sheet" data-sheet role="dialog" aria-label="Filters">
    <div class="sheet-handle"></div>
    <h3>Filter &amp; sort</h3>
    <div data-sheet-body style="display:flex;flex-direction:column;gap:12px"></div>
    <button class="btn btn-primary btn-block" data-sheet-done style="margin-top:20px">Show results</button>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <a class="wordmark" href="/">nightly build<span class="cursor" aria-hidden="true"></span></a>
          <p class="footer-fine">Shipped while you slept.<br>A Courtright Collective brand.</p>
        </div>
        <nav class="footer-links" aria-label="Footer">
          <a href="/shop">Shop</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a>
        </nav>
      </div>
      <p class="footer-fine">© <span data-year>2026</span> Courtright Collective. Printed on demand. Built at night.</p>
    </div>
  </footer>

  <script src="/js/app.js" defer></script>
  <script src="/js/render.js" defer></script>
  <script src="/js/shop.js" defer></script>
  <script>document.addEventListener("DOMContentLoaded",function(){var y=document.querySelector("[data-year]");if(y)y.textContent=new Date().getFullYear();});</script>
</body>
</html>
